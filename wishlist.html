<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Wishlist</title>
  <link rel="icon" type="image/png" href="notebooks photos/favicon_logo_y_1773081448158.png">
  <link rel="stylesheet" href="stile.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    body {
      font-family: Arial, sans-serif;

      background: #f9f6f1;
      color: #333;
    }

    .breadcrumb {
      font-size: 14px;
      color: gray;
      margin-bottom: 10px;
    }

    .wishlist-container {
      max-width: 900px;
      margin: 0 auto;
    }

    .wishlist-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .heart-icon {
      font-size: 40px;
      margin-bottom: -10px;
      margin-top: 20px;
    }

    h1 {
      font-size: 36px;
      margin: 0;
    }

    .wishlist-table {
      width: 100%;
      border-collapse: collapse;
    }

    .wishlist-table th,
    .wishlist-table td {
      padding: 15px;
      border-bottom: 1px solid #eee;
      vertical-align: middle;
    }

    .wishlist-table th {
      text-align: left;
      color: #555;
    }

    .product-info {
      display: flex;
      align-items: center;
    }

    .product-info img {
      width: 60px;
      height: 80px;
      object-fit: cover;
      margin: 0 15px;
    }

    .old-price {
      text-decoration: line-through;
      color: gray;
    }

    .new-price {
      color: #ffa6b3;
      font-weight: bold;
      margin-left: 5px;
    }

    .stock {
      color: green;
    }

    .added-date {
      font-size: 12px;
      color: gray;
    }

    .add-to-cart-btn {
      margin-top: 5px;
      padding: 8px 14px;
      background-color: #ff92a2;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .add-to-cart-btn:hover {
      background-color: #fc798d;

    }

    .delete-icon {
      cursor: pointer;
      color: gray;
      font-size: 20px;
    }

    @media (max-width: 768px) {
      .wishlist-table {
        display: block;
      }

      .wishlist-table thead {
        display: none;
        /* نخفي رأس الجدول في الجوال */
      }

      .wishlist-table tbody {
        display: flex;
        flex-direction: column;
        gap: 20px;
        margin-bottom: 40px;
      }

      .wishlist-table tr {
        display: flex;
        flex-direction: column;
        border: 1px solid #eee;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
      }

      .wishlist-table td {
        border: none;
        padding: 8px 0;
      }

      .product-info {
        flex-direction: row;
      }

      .product-info img {
        width: 70px;
        height: 90px;
        margin-left: 10px;
      }

      .add-to-cart-btn {
        width: 100%;
        margin-top: 10px;
      }

      .added-date {
        margin-top: 10px;
      }

      .heart-icon {
        margin-top: 40px;
      }
    }
  </style>
</head>

<body>
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">YIMYIM</a>
      <div class="sidebar-wrapper" id="sidebarWrapper">
        <div class="close-sidebar" id="closeBtnSidebar"><i class="fas fa-times"></i></div>
        <div class="nav-links">
          <a href="index.html#home">Home</a>
          <a href="shop.html">Shop</a>
          <a href="index.html#about">About</a>
          <a href="index.html#works">Works</a>
          <a href="contact.html">Contact</a>
        </div>
        <div class="icons" style="position: relative;">
          <i class="fas fa-search" id="searchBtn" style="cursor: pointer;"></i>
          <div id="searchPopup" class="search-popup">
            <input type="text" id="searchInput" placeholder="ابحث هنا...">
            <button onclick="performSearch()">بحث</button>
          </div>
          <i class="fas fa-heart" id="favoriteBtn" style="cursor: pointer;"></i>
          <i class="fas fa-user" id="userBtn" style="cursor: pointer;"></i>
          <i class="fas fa-shopping-cart" id="cartBtn" style="cursor: pointer;"></i>
        </div>
      </div>

      <div class="mobile-menu-btn" id="mobileMenuBtn">
        <span></span><span></span><span></span>
      </div>
    </div>
  </nav>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="wishlist-container">
    <div class="wishlist-header">
      <div class="heart-icon">♡</div>
      <h1>My Wishlist</h1>
    </div>

    <table class="wishlist-table">
      <thead>
        <tr>
          <th>Product name</th>
          <th>Unit price</th>
          <th>Stock status</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="wishlist-tbody">
        <!-- Populated by JS -->
      </tbody>
    </table>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const tbody = document.getElementById('wishlist-tbody');

      function renderWishlist() {
        let wishlistStr = localStorage.getItem('yim_wishlist');
        let wishlistArr = wishlistStr ? JSON.parse(wishlistStr) : [];

        tbody.innerHTML = '';

        if (wishlistArr.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 40px; color: gray;">Your wishlist is empty.</td></tr>';
          return;
        }

        wishlistArr.forEach((item, index) => {
          let dateStr = '';
          if (item.addedAt) {
            const dateObj = new Date(item.addedAt);
            dateStr = dateObj.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
          } else {
            const today = new Date();
            dateStr = today.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
          }

          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>
              <div class="product-info">
                 <span class="delete-icon" data-index="${index}" style="margin-right:15px;" title="Remove">🗑</span>
                 <img src="${item.img}" alt="${item.title}">
                 ${item.title}
              </div>
            </td>
            <td>
              <span class="new-price">${item.price}</span>
            </td>
            <td class="stock">In Stock</td>
            <td>
              <div class="added-date">Added on: ${dateStr}</div>
              <button class="add-to-cart-btn" onclick="addToCartFromWishlist(${index})">Add to cart</button>
            </td>
          `;
          tbody.appendChild(tr);
        });

        // Add delete event listeners
        document.querySelectorAll('.delete-icon').forEach(icon => {
          icon.addEventListener('click', (e) => {
            const idx = e.target.getAttribute('data-index');
            wishlistArr.splice(idx, 1);
            localStorage.setItem('yim_wishlist', JSON.stringify(wishlistArr));
            renderWishlist(); // Re-render the table
          });
        });
      }

      window.addToCartFromWishlist = function (index) {
        let wishlistStr = localStorage.getItem('yim_wishlist');
        let wishlistArr = wishlistStr ? JSON.parse(wishlistStr) : [];
        if (index >= 0 && index < wishlistArr.length) {
          let item = wishlistArr[index];
          let cartStr = localStorage.getItem('yim_cart');
          let cartArr = cartStr ? JSON.parse(cartStr) : [];

          let numericPrice = 0;
          let priceMatch = String(item.price).match(/\d+(\.\d+)?/);
          if (priceMatch) {
            numericPrice = parseFloat(priceMatch[0]);
          }

          let existingIndex = cartArr.findIndex(c => c.title === item.title);
          if (existingIndex > -1) {
            cartArr[existingIndex].qty += 1;
          } else {
            cartArr.push({
              title: item.title,
              price: numericPrice,
              img: item.img,
              qty: 1
            });
          }

          localStorage.setItem('yim_cart', JSON.stringify(cartArr));
          if (typeof showCartToast === 'function') {
            showCartToast('تم الاضافة الي السلة بنجاح!');
          } else {
            alert('تم الاضافة الي السلة بنجاح!');
          }
        }
      };

      renderWishlist();
    });
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script src="script.js"></script>
  <script src="script2.js"></script>
</body>

</html>
