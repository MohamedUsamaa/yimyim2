<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="stile.css" />
  <link rel="icon" type="image/png" href="notebooks photos/favicon_logo_y_1773081448158.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <title>Shopping Cart</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      color: #000000;
    }

    body {
      background-color: #f9f6f1;
      padding: 20px;
      overflow-x: hidden;
    }

    .navbar {
      margin-top: 0;
      position: absolute !important;
      background-color: transparent !important;
    }

    header {
      text-align: center;
      margin-top: 20px;
    }

    header h1 {
      font-size: 70px;
      font-weight: bold;
      color: #FFB6C1;
      padding-top: 40px;
      padding-right: 40px;

    }

    .container {
      display: flex;
      max-width: 1000px;
      margin: 40px auto;
      background: #f9f6f1;
      border-radius: 10px;
      overflow: hidden;
      flex-wrap: wrap;
      box-shadow: 0 4px 20px #FFB6C1;
    }

    .cart {
      flex: 2;
      padding: 30px;
      overflow-x: auto;
    }

    .cart h2 {
      margin-bottom: 20px;
    }

    .cart table {
      width: 100%;
      border-collapse: collapse;
    }


    .cart th,
    .cart td {
      text-align: left;
      padding: 20px;
    }

    .cart th {
      color: #fd96a5;
    }

    .cart td img {
      width: 50px;
      margin-right: 10px;
      vertical-align: middle;
    }

    .product-info {
      display: inline-block;
      vertical-align: middle;
    }

    .product-info span {
      font-size: 12px;
      color: #f35b5b;
      display: block;
    }

    .product-info a {
      font-size: 12px;
      color: #999;
      text-decoration: none;
    }

    .qty {
      display: flex;
      align-items: center;
    }

    .qty button {
      background: #eee;
      border: none;
      padding: 5px 10px;
      font-size: 16px;
      cursor: pointer;
    }

    .qty input {
      width: 40px;
      text-align: center;
      border: 1px solid #ccc;
      margin: 0 5px;
    }

    .summary {
      flex: 1;
      background: #f9f9f9;
      padding: 30px;
      border-left: 1px solid #ddd;
    }

    .summary h2 {
      margin-bottom: 20px;
    }

    .summary h4 {
      margin-top: 3px;
    }

    .summary p {
      margin-top: 3px;
    }

    .summary select,
    .summary input[type="text"] {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    .summary button {
      width: 100%;
      background: #fa9ba9;
      border: none;
      padding: 12px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    .summary button:hover {
      background-color: #fc798d;
    }

    .checkout {
      background: #FFB6C1;
      margin-top: 20px;
    }

    .checkout:hover {
      background-color: #fc798d;
    }

    .cart a {
      display: inline-block;
      margin-top: 20px;
      color: #fc7c8f;
      text-decoration: none;
      position: relative;
      z-index: 10;
      padding: 5px 0;
      cursor: pointer;
    }



    @media (max-width: 768px) {
      .navbar {
        position: fixed !important;
        top: 0;
        left: 0;
        width: 100%;
        background-color: rgba(249, 246, 241, 0.95) !important;
        backdrop-filter: blur(10px);
        z-index: 9999;
      }

      .container {
        flex-direction: column;
        margin: 15px;
        /* Added spacing from edge of phone */
      }

      header h1 {
        margin-top: 30px;
        padding-top: 70px;
        font-size: 40px;
        /* Reduced to fit mobile */
        padding-right: 0;
      }

      .cart {
        padding: 15px;
        overflow-x: hidden;
      }

      .cart table,
      .cart thead,
      .cart tbody,
      .cart th,
      .cart td,
      .cart tr {
        display: block;
        width: 100%;
      }

      .cart thead {
        display: none;
        /* Hide table headers on mobile */
      }

      .cart tr {
        margin-bottom: 20px;
        border: 1px solid #eee;
        border-radius: 8px;
        padding: 15px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        /* Card-like shadow */
      }

      .cart td {
        display: flex;
        /* Use flexbox for item rows */
        align-items: center;
        justify-content: space-between;
        padding: 10px 0;
        text-align: right;
        border: none;
        border-bottom: 1px dashed #eee;
        /* Divider */
      }

      .cart td:last-child {
        border-bottom: none;
        /* Remove last divider */
      }

      /* Use CSS Counter or pseudo-element for headings on mobile */
      .cart td::before {
        font-weight: bold;
        color: #FFB6C1;
        text-align: left;
        flex: 1;
        content: attr(data-label);
        /* Fetch from HTML if available, but here we hardcode */
      }

      .cart td:nth-of-type(1)::before {
        content: "Product Details";
        margin-bottom: 10px;
      }

      .cart td:nth-of-type(2)::before {
        content: "Quantity";
      }

      .cart td:nth-of-type(3)::before {
        content: "Price";
      }

      .cart td:nth-of-type(4)::before {
        content: "Total";
      }

      /* Fix the product image and title alignment */
      .cart td:nth-of-type(1) {
        flex-direction: column;
        align-items: flex-start;
        /* Left align contents */
      }

      .product-info {
        display: block;
        margin-top: 5px;
        text-align: left;
      }

      .cart td img {
        margin-bottom: 5px;
      }

      .qty {
        justify-content: flex-end;
        /* Push counter to the right */
      }
    }
  </style>
</head>

<body>

  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">YIMYIM</a>
      <div class="sidebar-wrapper" id="sidebarWrapper">
        <div class="close-sidebar" id="closeBtnSidebar"><i class="fas fa-times"></i></div>
        <div class="nav-links">
          <a href="index.html#home">Home</a>
          <a href="shop.html">Shop</a>
          <a href="index.html#about">About</a>
          <a href="index.html#works">Works</a>
          <a href="contact.html">Contact</a>
        </div>
        <div class="icons" style="position: relative;">
          <i class="fas fa-search" id="searchBtn" style="cursor: pointer;"></i>
          <div id="searchPopup" class="search-popup">
            <input type="text" id="searchInput" placeholder="ابحث هنا...">
            <button onclick="performSearch()">بحث</button>
          </div>
          <i class="fas fa-heart" id="favoriteBtn" style="cursor: pointer;"></i>
          <i class="fas fa-user" id="userBtn" style="cursor: pointer;"></i>
          <i class="fas fa-shopping-cart" id="cartBtn" style="cursor: pointer;"></i>
        </div>
      </div>

      <div class="mobile-menu-btn" id="mobileMenuBtn">
        <span></span><span></span><span></span>
      </div>
    </div>
  </nav>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <header>
    <h1>YIMYIM</h1>
  </header>

  <div class="container">
    <div class="cart">
      <h2>Shopping Cart <span style="float:right">3 Items</span></h2>
      <table>
        <thead>
          <tr>
            <th>Product Details</th>
            <th>Quantity</th>
            <th>Price</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody id="cart-body">
          <!-- Items will be injected here -->
        </tbody>
      </table>
      <a href="shop.html" onclick="window.location.href='shop.html'; return false;">← Continue Shopping</a>
    </div>

    <div class="summary">
      <h2>Order Summary</h2>
      <p>Items <span style="float:right" id="summary-items">3</span></p>
      <p>EGP<span id="summary-price">457.98</span></p>
      <h4>SHIPPING</p>
        <select>
          <option value="85">Standard Delivery - EGP85.00</option>
        </select>

        <p>PROMO CODE</p>
        <input type="text" placeholder="Enter your code">
        <button>APPLY</button>

        <p style="margin-top: 20px;">TOTAL COST <span style="float:right">EGP<span id="total-cost">1000.00</span></span>
        </p>
        <button class="checkout" onclick="window.location.href='checkout.html'">CHECKOUT</button>
    </div>
  </div>

  <script>
    let products = [];

    function loadCart() {
      let cartStr = localStorage.getItem('yim_cart');
      products = cartStr ? JSON.parse(cartStr) : [];
      renderCart();
    }

    function renderCart() {
      const tbody = document.getElementById('cart-body');
      tbody.innerHTML = '';
      let total = 0, items = 0;

      if (products.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 40px; color: gray; display:table-cell !important;">Your cart is empty.</td></tr>';
        document.getElementById('summary-items').innerText = '0';
        document.getElementById('summary-price').innerText = '0.00';
        document.getElementById('total-cost').innerText = '0.00';
        document.querySelector('.cart h2 span').innerText = '0 Items';
        return;
      }

      products.forEach((product, index) => {
        const itemTotal = product.price * product.qty;
        total += itemTotal;
        items += product.qty;

        tbody.innerHTML += `
          <tr>
            <td>
              <img src="${product.img}" alt="">
              <div class="product-info">
                ${product.title}
                <a href="#" style="display:block; margin-top:8px; font-weight:bold;" onclick="removeItem(${index}); return false;">Remove</a>
              </div>
            </td>
            <td class="qty">
              <button onclick="changeQty(${index}, -1)">-</button>
              <input type="text" value="${product.qty}" readonly>
              <button onclick="changeQty(${index}, 1)">+</button>
            </td>
            <td>EGP ${product.price.toFixed(2)}</td>
            <td>EGP ${itemTotal.toFixed(2)}</td>
          </tr>
        `;
      });

      document.querySelector('.cart h2 span').innerText = items + ' Items';
      document.getElementById('summary-items').innerText = items;
      document.getElementById('summary-price').innerText = total.toFixed(2);
      document.getElementById('total-cost').innerText = (total + 85).toFixed(2);
    }

    function changeQty(index, delta) {
      if (products[index].qty + delta >= 1) {
        products[index].qty += delta;
        localStorage.setItem('yim_cart', JSON.stringify(products));
        renderCart();
      }
    }

    function removeItem(index) {
      products.splice(index, 1);
      localStorage.setItem('yim_cart', JSON.stringify(products));
      renderCart();
    }

    loadCart();
  </script>


  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script src="script.js"></script>
  <script src="script2.js"></script>

</body>

</html>
