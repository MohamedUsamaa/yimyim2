<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logins</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="icon" type="image/png" href="notebooks photos/favicon_logo_y_1773081448158.png">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
</head>

<body>
  <div class="card">
    <div class="card-bg card-bg-1"></div>
    <div class="card-bg card-bg-2"></div>
    <img class="logo logo-1" src="logo.svg" />
    <img class="logo logo-2" src="logo.svg" />
    <div class="form signin">
      <form id="signinFormSubmit" onsubmit="handleSignIn(event)">
        <h2>Login</h2>
        <input type="text" id="signinEmail" placeholder="Email" required />
        <input type="password" placeholder="Password" required />
        <p>Forgot password?</p>
        <button type="submit">SIGN IN</button>
        <a onclick="toggleView()">Don't have an account? <em>Sign up</em></a>
      </form>
    </div>
    <div class="form signup active">
      <form id="signupFormSubmit" onsubmit="handleSignUp(event)">
        <h2>Register</h2>
        <input type="text" id="signupName" placeholder="Name" required />
        <input type="email" id="signupEmail" placeholder="Email" required />
        <input type="password" placeholder="Password" required />
        <button type="submit">SIGN UP</button>
        <a onclick="toggleView()">Already have an account? <em>Sign in</em></a>
      </form>
    </div>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #f2f3fe;
        color: #FFB6C1;
        height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        font-family: "Euclid Circular B", "Poppins";
      }

      :root {
        --color-primary: #FFB6C1;
      }

      .card {
        position: relative;
        overflow: hidden;
        width: 660px;
        height: 440px;
        border-radius: 32px;
        background: #ffffff;
        box-shadow: 0 12px 80px rgba(0, 0, 0, 0.12);
      }

      .card-bg {
        position: absolute;
        z-index: 2;
        top: 0;
        bottom: 0;
        left: 0;
        width: 860px;
        height: 440px;
        rotate: -45deg;
        transform-origin: 0% 100%;
        background: var(--color-primary);
      }

      .card-bg-2 {
        background: var(--color-primary);
        rotate: 0deg;
        opacity: 0;
        right: 0;
        left: auto;
        transform-origin: 100% 100%;
      }

      @keyframes card-bg-signup {
        0% {
          rotate: -45deg;
        }

        50% {
          opacity: 1;
        }

        50%,
        100% {
          rotate: 0deg;
        }

        50.01%,
        100% {
          opacity: 0;
        }
      }

      @keyframes card-bg-signin {
        0% {
          opacity: 0;
          rotate: 0deg;
        }

        50% {
          rotate: 0deg;
          opacity: 0;
        }

        50%,
        100% {
          rotate: 0;
        }

        50.01%,
        100% {
          opacity: 1;
        }

        100% {
          rotate: -45deg;
        }
      }

      @keyframes card-bg-2-signup {

        0%,
        50% {
          rotate: 0;
          opacity: 0;
        }

        50.01% {
          opacity: 1;
          rotate: 0deg;
        }

        100% {
          opacity: 1;
          rotate: 45deg;
        }
      }

      @keyframes card-bg-2-signin {
        0% {
          rotate: 45deg;
          opacity: 1;
        }

        50%,
        100% {
          rotate: 0deg;
          opacity: 1;
        }

        50.01%,
        100% {
          opacity: 0;
        }
      }

      .card-bg-1.signup {
        animation: card-bg-signup 1.5s both;
      }

      .card-bg-1.signin {
        animation: card-bg-signin 1.5s both;
      }

      .card-bg-2.signup {
        animation: card-bg-2-signup 1.5s both;
      }

      .card-bg-2.signin {
        animation: card-bg-2-signin 1.5s both;
      }

      .logo {
        position: absolute;
        top: 72px;
        z-index: 2;
        height: 24px;
        transition: 0.3s;
        opacity: 0;
      }

      .logo-1 {
        translate: -180px 0;
        left: 48px;
      }

      .logo-2 {
        translate: 180px 0;
        right: 48px;
      }

      .card-bg.signin~.logo-1,
      .card-bg.signup~.logo-2 {
        opacity: 1;
        translate: 0;
        transition: 0.3s 1.25s;
      }

      .form {
        position: absolute;
        z-index: 3;
        top: 0;
        left: 0;
        bottom: 0;
        width: 50%;
        display: grid;
        place-items: center;
      }

      .form h2 {
        text-align: center;
        font-weight: 500;
      }

      .form form {
        display: grid;
        gap: 12px;
        opacity: 0;
        transition: 0.3s;
      }

      .form a {
        display: inline-flex;
        flex-direction: column;
        gap: 8px;
        color: #a7a7ad;
        cursor: pointer;
        font-size: 14px;
        text-align: center;
      }

      .form p {
        font-size: 14px;
        text-align: center;
        margin: 8px 0;
        color: #a7a7ad;
      }

      .form a em {
        display: block;
        font-style: normal;
        font-size: 15px;
        color: var(--color-primary);
      }

      .form.signup {
        translate: 100% 0;
      }

      .form.signup form {
        translate: 320px 0;
      }

      .form.signin form {
        translate: -320px 0;
      }

      .form.signup.active form,
      .form.signin.active form {
        opacity: 1;
        translate: 0;
        transition: 0.5s 1s;
      }

      form input {
        width: 260px;
        padding: 0 12px;
        font-size: 14px;
        background: #f4f4f7;
      }

      form input::placeholder {
        color: #a7a7ad;
      }

      input,
      button {
        border: 0;
        border-radius: 8px;
        height: 40px;
        font-family: inherit;
        font-size: 16px;
      }

      form button {
        color: #f9f9f9;
        background: var(--color-primary);
        letter-spacing: 1px;
        font-size: 14px;
        cursor: pointer;
        transition: background-color 0.3s;
      }

      form button:hover {
        background-color: #ff92a2;
      }

      /* ========================================= */
      /*   Mobile Responsive & Animations Update   */
      /* ========================================= */
      @media (max-width: 768px) {
        .card {
          width: 90%;
          max-width: 400px;
          height: 550px;
          display: flex;
          flex-direction: column;
        }

        /* Adjust the background shapes to span differently on mobile */
        .card-bg {
          width: 200%;
          height: 150%;
          top: -50%;
          left: -50%;
          transform-origin: 50% 50%;
        }

        /* When card-bg-1 animates for signup/signin on mobile */
        @keyframes card-bg-signup-mob {
          0% {
            transform: translateY(0) rotate(-45deg);
          }

          50% {
            transform: translateY(-50%) rotate(0deg);
            opacity: 1;
          }

          100% {
            transform: translateY(-100%) rotate(0deg);
            opacity: 0;
          }
        }

        @keyframes card-bg-signin-mob {
          0% {
            transform: translateY(-100%) rotate(0deg);
            opacity: 0;
          }

          50% {
            transform: translateY(-50%) rotate(0deg);
            opacity: 1;
          }

          100% {
            transform: translateY(0) rotate(-45deg);
            opacity: 1;
          }
        }

        .card-bg-1.signup {
          animation: card-bg-signup-mob 1.5s both;
        }

        .card-bg-1.signin {
          animation: card-bg-signin-mob 1.5s both;
        }

        @keyframes card-bg-2-signup-mob {
          0% {
            transform: translateY(100%) rotate(0deg);
            opacity: 0;
          }

          50% {
            transform: translateY(50%) rotate(0deg);
            opacity: 1;
          }

          100% {
            transform: translateY(0) rotate(-45deg);
            opacity: 1;
          }
        }

        @keyframes card-bg-2-signin-mob {
          0% {
            transform: translateY(0) rotate(-45deg);
            opacity: 1;
          }

          50% {
            transform: translateY(50%) rotate(0deg);
            opacity: 1;
          }

          100% {
            transform: translateY(100%) rotate(0deg);
            opacity: 0;
          }
        }

        .card-bg-2.signup {
          animation: card-bg-2-signup-mob 1.5s both;
        }

        .card-bg-2.signin {
          animation: card-bg-2-signin-mob 1.5s both;
        }

        /* Logos positioning on mobile */
        .logo {
          top: 30px;
        }

        .logo-1 {
          left: 50%;
          translate: -50% -100px;
        }

        .logo-2 {
          right: auto;
          left: 50%;
          translate: -50% 100px;
        }

        .card-bg.signin~.logo-1 {
          translate: -50% 0;
          transition: translate 0.5s 1.25s, opacity 0.5s 1.25s;
        }

        .card-bg.signup~.logo-2 {
          translate: -50% 0;
          transition: translate 0.5s 1.25s, opacity 0.5s 1.25s;
        }

        /* Forms Layout & Translations on Mobile */
        .form {
          width: 100%;
          height: 100%;
          padding: 2rem;
        }

        .form form {
          width: 100%;
          max-width: 320px;
        }

        form input {
          width: 100%;
          height: 45px;
        }

        form button {
          height: 48px;
          font-size: 16px;
          margin-top: 15px;
          background: #FFB6C1;
          /* Different distinct brand color for mobile */
          color: #ffffff;
          border-radius: 25px;
          box-shadow: 0 4px 15px rgba(57, 34, 34, 0.4);
          transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
          position: relative;
          overflow: hidden;
          z-index: 1;
        }

        form button::before {
          content: '';
          position: absolute;
          top: 0;
          left: -100%;
          width: 100%;
          height: 100%;
          background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
          transition: left 0.6s ease;
          z-index: -1;
        }

        form button:active {
          transform: translateY(-4px) scale(1.02);
          box-shadow: 0 10px 25px rgba(57, 34, 34, 0.6);
          background: #FFB6C1;
        }

        form button:hover {
          transform: translateY(-4px) scale(1.02);
          box-shadow: 0 10px 25px rgba(57, 34, 34, 0.6);
          background: #ff92a2;
        }

        form button:hover::before,
        form button:active::before {
          left: 100%;
        }

        .form.signup {
          translate: 0 0;
          pointer-events: none;
          /* disable clicks when hidden */
        }

        .form.signup.active {
          pointer-events: auto;
        }

        .form.signin {
          pointer-events: none;
        }

        .form.signin.active {
          pointer-events: auto;
        }

        /* Slide directions for mobile (Vertical instead of Horizontal) */
        .form.signup form {
          translate: 0 100%;
        }

        .form.signin form {
          translate: 0 -100%;
        }

        .form.signup.active form,
        .form.signin.active form {
          opacity: 1;
          translate: 0 0;
          transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.8s, opacity 0.5s 0.8s;
        }
      }
    </style>
  </div>
  <script src="api.js"></script>
  <script>
    const signinForm = document.querySelector(".form.signin");
    const signupForm = document.querySelector(".form.signup");
    const cardBg1 = document.querySelector(".card-bg-1");
    const cardBg2 = document.querySelector(".card-bg-2");

    const toggleView = () => {
      const signinActive = signinForm.classList.contains("active");

      signinForm.classList.toggle("active", !signinActive);
      signupForm.classList.toggle("active", signinActive);

      [cardBg1, cardBg2].forEach((el) =>
        el.classList.toggle("signin", signinActive)
      );
      [cardBg1, cardBg2].forEach((el) =>
        el.classList.toggle("signup", !signinActive)
      );
    };

    async function handleSignIn(e) {
      e.preventDefault();
      const email = document.getElementById('signinEmail').value;
      const password = e.target.querySelector('input[type="password"]').value;
      const res = await api.login(email, password);
      if (res.success) {
        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('userName', res.user.name);
        localStorage.setItem('userEmail', res.user.email);
        window.location.href = 'index.html';
      } else {
        alert(res.message || 'Invalid email or password');
      }
    }

    async function handleSignUp(e) {
      e.preventDefault();
      const name = document.getElementById('signupName').value;
      const email = document.getElementById('signupEmail').value;
      const password = e.target.querySelector('input[type="password"]').value;
      const res = await api.register(name, email, password);
      if (res.success) {
        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('userName', res.user.name);
        localStorage.setItem('userEmail', res.user.email);
        window.location.href = 'dashboard.html';
      } else {
        alert(res.message || 'Registration failed');
      }
    }
  </script>
</body>

</html>
